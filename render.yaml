services:
  - type: web
    name: titans-volei-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    nodeVersion: 20.0.0
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
